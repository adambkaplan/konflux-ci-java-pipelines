---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: test-maven-build-happy-path
spec:
  pipelineRef:
    name: maven-build
  params:
    - name: git-url
      value: https://github.com/hermetoproject/integration-tests.git
    - name: revision
      value: maven/e2e
    - name: output-image
      value: registry-service.kind-registry/test-maven-repo:latest
    - name: image-expires-after
      value: ""
    - name: enable-cache-proxy
      value: "false"
  taskRunTemplate:
    serviceAccountName: appstudio-pipeline
  workspaces:
    - name: workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
