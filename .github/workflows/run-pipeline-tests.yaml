# yamllint disable-file

name: Run Pipeline Tests

"on":
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:
    types: [checks_requested]

jobs:
  run-pipeline-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout this Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: "${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}"
          path: self

      - name: Get all changed files in the PR from pipelines directory
        id: changed-pipeline-dirs
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47.0.0
        with:
          files: |
            pipelines/**/*.{yaml,sh}
          dir_names: "true"
          path: self

      - name: Check if tests dir exists for all the pipelines changed
        if: steps.changed-pipeline-dirs.outputs.any_changed == 'true'
        id: pipelines-to-be-tested
        env:
          CHANGED_DIRS: ${{ steps.changed-pipeline-dirs.outputs.all_changed_files }}
        run: |
          echo "Pipeline dirs changed in PR: ${CHANGED_DIRS}"
          PIPELINES_TO_TEST=()
          for DIR in ${CHANGED_DIRS}; do
            case "$DIR" in
              pipelines)
                for tests_dir in self/pipelines/*/tests; do
                  if [ -d "$tests_dir" ]; then
                    pipeline_dir=$(dirname "$tests_dir")
                    pipeline_dir=${pipeline_dir#self/}
                    PIPELINES_TO_TEST+=("$pipeline_dir")
                  fi
                done
                ;;
              pipelines/template-build)
                for name in $(yq '.resources[]' self/pipelines/kustomization.yaml); do
                  if [ -d "self/pipelines/${name}/tests" ]; then
                    PIPELINES_TO_TEST+=("pipelines/${name}")
                  fi
                done
                ;;
              pipelines/*)
                if [ -d "self/${DIR}/tests" ]; then
                  PIPELINES_TO_TEST+=("${DIR}")
                else
                  echo "INFO: tests dir does not exist: self/${DIR}/tests"
                fi
                ;;
            esac
          done

          if [ ${#PIPELINES_TO_TEST[@]} -gt 0 ]; then
            mapfile -t PIPELINES_TO_TEST < <(printf '%s\n' "${PIPELINES_TO_TEST[@]}" | sort -u)
          fi

          echo "Pipelines with tests: ${PIPELINES_TO_TEST[*]}"
          echo "pipelinelist=${PIPELINES_TO_TEST[*]}" >> $GITHUB_OUTPUT

      - name: Install tkn
        if: steps.changed-pipeline-dirs.outputs.any_changed == 'true'
        uses: ./self/.github/actions/install-tkn

      - name: Checkout konflux-ci/konflux-ci Repository
        if: steps.changed-pipeline-dirs.outputs.any_changed == 'true'
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: 'konflux-ci/konflux-ci'
          path: konflux-ci
          ref: 3a694f8d7b49e74f476bb9414fc3e6d03d50ae37

      - name: Create k8s Kind Cluster
        if: steps.changed-pipeline-dirs.outputs.any_changed == 'true'
        uses: helm/kind-action@92086f6be054225fa813e0a4b13787fc9088faab # v1.13.0
        with:
          config: konflux-ci/kind-config.yaml

      - name: Show version information
        if: steps.changed-pipeline-dirs.outputs.any_changed == 'true'
        run: |
          kubectl version
          kind version

      - name: Deploying Dependencies
        if: steps.changed-pipeline-dirs.outputs.any_changed == 'true'
        run: |
          cd $GITHUB_WORKSPACE/konflux-ci
          ./deploy-deps.sh

      - name: Wait for the dependencies to be ready
        if: steps.changed-pipeline-dirs.outputs.any_changed == 'true'
        run: |
          cd $GITHUB_WORKSPACE/konflux-ci
          ./wait-for-all.sh

      - name: Validate Tekton Pipelines Syntax
        if: steps.changed-pipeline-dirs.outputs.any_changed == 'true'
        run: |
          cd self
          ./.github/scripts/check_task_and_pipeline_yamls.sh

      - name: Deploying Konflux
        if: steps.pipelines-to-be-tested.outputs.pipelinelist != ''
        run: |
          cd $GITHUB_WORKSPACE/konflux-ci
          ./deploy-konflux.sh

      - name: List namespaces
        if: steps.pipelines-to-be-tested.outputs.pipelinelist != ''
        run: |
          kubectl get namespace

      - name: Deploy test resources
        if: steps.pipelines-to-be-tested.outputs.pipelinelist != ''
        run: |
          cd $GITHUB_WORKSPACE/konflux-ci
          ./deploy-test-resources.sh

      - name: Run the pipeline tests
        if: steps.pipelines-to-be-tested.outputs.pipelinelist != ''
        env:
          PIPELINE_LIST: ${{ steps.pipelines-to-be-tested.outputs.pipelinelist }}
        run: |
          echo "Pipelines to be tested: ${PIPELINE_LIST}"
          cd $GITHUB_WORKSPACE/self
          ./.github/scripts/test_tekton_pipelines.sh ${PIPELINE_LIST}
